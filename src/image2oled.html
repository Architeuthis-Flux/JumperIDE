<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to OLED — JumperIDE</title>
    <meta name="description" content="Convert images to OLED bitmap (.bin) for Jumperless. Like image2cpp, outputs 128×32 or custom size with header.">
    <link rel="icon" type="image/png" href="assets/icon409.png"/>
    <link rel="stylesheet" href="app_common.css">
    <link rel="stylesheet" href="image2oled.css">
</head>
<body id="image2oled-page">
    <header class="i2o-header">
        <a href="ViperIDE.html" class="i2o-back">← JumperIDE</a>
        <h1>Image to OLED</h1>
        <p class="i2o-desc">Convert images to OLED bitmap (.bin) for Jumperless. All processing is done locally; nothing is uploaded.</p>
    </header>

    <main class="i2o-main">
        <!-- 1. Select image -->
        <section class="i2o-section">
            <h2>1. Select image</h2>
            <div class="i2o-dropzone" id="dropzone">
                <input type="file" id="file-input" accept="image/*" hidden>
                <p class="i2o-drop-text">Drop image here or <button type="button" class="i2o-btn-link" id="browse-btn">browse</button></p>
            </div>
        </section>

        <!-- 2. Image settings -->
        <section class="i2o-section">
            <h2>2. Image settings</h2>
            <div class="i2o-settings">
                <div class="i2o-row">
                    <label>Canvas size</label>
                    <span class="i2o-inline">
                        <input type="number" id="canvas-width" min="1" max="128" value="128"> ×
                        <input type="number" id="canvas-height" min="1" max="64" value="32"> px
                    </span>
                </div>
                <div class="i2o-row">
                    <label>Background</label>
                    <select id="bg-color">
                        <option value="black">Black</option>
                        <option value="white">White</option>
                    </select>
                </div>
                <div class="i2o-row">
                    <label><input type="checkbox" id="invert"> Invert image colors</label>
                </div>
                <div class="i2o-row">
                    <label>Brightness / alpha threshold</label>
                    <input type="range" id="threshold" min="0" max="255" value="128">
                    <span id="threshold-value">128</span>
                </div>
                <div class="i2o-row">
                    <label>Scaling</label>
                    <select id="scaling">
                        <option value="stretch">Stretch to fill canvas</option>
                        <option value="fit">Scale to fit (keep proportions)</option>
                        <option value="fill">Scale to fill (keep proportions, crop)</option>
                        <option value="original">Original size (center on canvas)</option>
                    </select>
                </div>
                <div class="i2o-row">
                    <label>Center image</label>
                    <span class="i2o-inline">
                        <label><input type="checkbox" id="center-h" checked> horizontally</label>
                        <label><input type="checkbox" id="center-v" checked> vertically</label>
                    </span>
                </div>
                <div class="i2o-row">
                    <label>Rotate</label>
                    <select id="rotate">
                        <option value="0">0°</option>
                        <option value="90">90°</option>
                        <option value="180">180°</option>
                        <option value="270">270°</option>
                    </select>
                </div>
                <div class="i2o-row">
                    <label>Flip</label>
                    <span class="i2o-inline">
                        <label><input type="checkbox" id="flip-h"> horizontally</label>
                        <label><input type="checkbox" id="flip-v"> vertically</label>
                    </span>
                </div>
            </div>
        </section>

        <!-- 3. Preview -->
        <section class="i2o-section">
            <h2>3. Preview</h2>
            <div class="i2o-preview-wrap">
                <div class="i2o-preview-placeholder" id="preview-placeholder">No image loaded</div>
                <canvas id="preview-canvas" class="i2o-preview-canvas" hidden></canvas>
            </div>
        </section>

        <!-- 4. Output -->
        <section class="i2o-section">
            <h2>4. Output</h2>
            <div class="i2o-output">
                <p class="i2o-output-info" id="output-info">Load an image and adjust settings to generate a .bin file.</p>
                <div class="i2o-output-buttons">
                    <button type="button" class="i2o-btn i2o-btn-primary" id="btn-download" disabled>Download .bin</button>
                    <button type="button" class="i2o-btn" id="btn-open-ide" disabled>Open in JumperIDE</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="image2oled.js"></script>
</body>
</html>
