<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse OLED Images — JumperIDE</title>
    <link rel="icon" type="image/png" href="assets/icon409.png"/>
    <link rel="stylesheet" href="app_common.css">
    <style>
        body { font-family: var(--font-family, system-ui, sans-serif); padding: 1rem; margin: 0; background: var(--bg-color, #1a1a1a); color: var(--fg-color, #e0e0e0); }
        .browse-header { margin-bottom: 1rem; }
        .browse-header h1 { font-size: 1.25rem; margin: 0 0 0.25rem 0; }
        .browse-header p { margin: 0; opacity: 0.8; font-size: 0.9rem; }
        .browse-loading, .browse-error { padding: 1.5rem; text-align: center; }
        .browse-error { color: var(--error-color, #e57373); }
        .browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .browse-card { background: var(--panel-bg, #252525); border-radius: 8px; padding: 0.75rem; border: 1px solid var(--border-color, #333); }
        .browse-card h3 { margin: 0 0 0.35rem 0; font-size: 0.95rem; font-weight: 600; }
        .browse-card .author { font-size: 0.8rem; opacity: 0.8; margin-bottom: 0.35rem; }
        .browse-card .desc { font-size: 0.8rem; opacity: 0.9; margin-bottom: 0.75rem; line-height: 1.35; max-height: 2.7em; overflow: hidden; text-overflow: ellipsis; }
        .browse-card .btn-open { display: inline-block; padding: 0.35rem 0.6rem; font-size: 0.8rem; background: var(--accent-color, #6366f1); color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .browse-card .btn-open:hover { opacity: 0.9; }
        .browse-card .btn-open:disabled { opacity: 0.5; cursor: not-allowed; }
        .browse-card-preview { min-height: 72px; display: flex; align-items: center; justify-content: center; background: #111; border-radius: 6px; margin-bottom: 0.5rem; overflow: hidden; }
        .browse-preview-canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; max-width: 100%; }
        .browse-preview-loading, .browse-preview-error { font-size: 0.8rem; opacity: 0.7; }
        .browse-card-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .browse-card .btn-edit { padding: 0.35rem 0.6rem; font-size: 0.8rem; background: transparent; color: var(--fg-color); border: 1px solid var(--border-color, #555); border-radius: 4px; cursor: pointer; }
        .browse-card .btn-edit:hover { opacity: 0.9; }
        .browse-card .btn-history { padding: 0.35rem 0.6rem; font-size: 0.8rem; background: transparent; color: var(--fg-color); border: 1px solid var(--border-color, #555); border-radius: 4px; cursor: pointer; }
        .browse-card .btn-history:hover { opacity: 0.9; }
        .browse-history-list { max-height: 40vh; overflow: auto; margin-bottom: 0.5rem; }
        .browse-history-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border-color, #333); }
        .browse-history-meta { font-size: 0.85rem; opacity: 0.9; }
        .browse-history-row .btn-open-rev { font-size: 0.8rem; padding: 0.25rem 0.5rem; }
        .browse-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .browse-modal { background: var(--bg-color); color: var(--fg-color); border-radius: 8px; padding: 1rem; min-width: 280px; max-width: 90vw; }
        .browse-modal h3 { margin: 0 0 0.75rem 0; }
        .browse-modal-body label { display: block; margin-top: 0.5rem; }
        .browse-modal-body input[type="text"] { width: 100%; box-sizing: border-box; padding: 0.4rem; margin-top: 0.25rem; }
        .browse-edit-hint { font-size: 0.8rem; opacity: 0.8; margin: 0.25rem 0 0 0; }
        .browse-modal-body .btn-choose-file { margin: 0.25rem 0; padding: 0.35rem 0.6rem; font-size: 0.85rem; }
        .browse-modal-body .modal-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .browse-modal-body .modal-actions button { padding: 0.4rem 0.75rem; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="browse-header">
        <h1>OLED Images</h1>
        <p>Shared registry — open any image in the editor</p>
    </div>
    <div id="browse-root">
        <div class="browse-loading" id="browse-loading">Loading…</div>
    </div>
    <script type="module" src="oled_images_browse.js"></script>
</body>
</html>
