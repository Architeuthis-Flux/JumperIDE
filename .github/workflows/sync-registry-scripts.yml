# Pull scripts from the registry into the repo and commit so you can see/edit them locally.
# Runs on schedule and can be triggered manually (Actions → Sync registry scripts → Run workflow).
name: Sync registry scripts

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write  # read + push commits

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check registry response
        run: |
          echo "Registry script count:"
          curl -s "https://jumperscripts.kevinc-af9.workers.dev/scripts" | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log(Array.isArray(d.scripts) ? d.scripts.length + ' scripts' : 'unexpected: ' + JSON.stringify(d).slice(0,120));"

      - name: Sync registry to repo
        id: sync
        env:
          REGISTRY_URL: "https://jumperscripts.kevinc-af9.workers.dev"
        run: |
          node cloudflare/script-registry-worker/sync-registry-to-repo.js
          echo "Scripts dir after sync:"
          ls -la cloudflare/script-registry-worker/scripts/ || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloudflare/script-registry-worker/scripts/
          git status
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync scripts from registry"
            git push origin "HEAD:${{ github.ref_name }}"
          else
            echo "No changes to commit"
          fi
