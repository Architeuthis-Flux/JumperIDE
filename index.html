<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JumperIDE</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 40em; margin: 2em auto; padding: 0 1em; }
        code { background: #eee; padding: .2em .4em; border-radius: 3px; }
        a { color: #0066cc; }
    </style>
</head>
<body>
    <h1>JumperIDE</h1>
    <p>This app must be served from the <code>build/</code> directory.</p>
    <ul>
        <li>Run <code>npm run start</code>, then open <a href="http://localhost:10001">http://localhost:10001</a></li>
        <li>Or run <code>npm run build</code> then <code>npx serve build -l 10001</code></li>
    </ul>
</body>
</html>
